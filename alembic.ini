# Alembic configuration — NQAI Voice
# DB URL set via NEUROVOICE_DATABASE_URL env at runtime (env.py reads it).
# Forward-only migration policy: see docs/architecture/data-model.md §3.

[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
output_encoding = utf-8
# sqlalchemy.url is set programmatically from env in env.py — do not hardcode here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
