schema_version: 2

# Bundled example voices for first-boot smoke tests + getting-started.
#
# These are NOT production voices. They exist so a fresh checkout can
# run `scripts/bootstrap_voices.py` against an empty catalog and have
# something to synthesize against. Real tenant voices come in via
# POST /v1/voices through the public API.
#
# A reference audio file matching `reference_audio` must sit in
# `data/reference-audio/` before bootstrap can upload — the audio
# binaries are git-ignored, so operators provide their own.
voices:
  - schema_version: 2
    voice_id: tr-warm-storyteller-v0
    display_name: "Turkish Warm Storyteller v0 (example)"
    language: tr
    gender: neutral
    style_tags: [warm, narrative, storyteller]
    source: example
    license: example
    reference_audio: tr-warm-storyteller-v0-reference.mp3
