# 5-slot launch catalog:
#   - 1 NEEKO character voice
#   - 2 NIVA application voices
#   - 2 NeuroCourse instructor voices
#
# Slot 1 is the NEEKO bridge voice; the rest are placeholders that should be
# replaced with real, legally clean reference recordings before launch.
#
# Until then they can be populated either by (a) calling POST /v1/voices with a
# real reference audio file, or (b) running `bootstrap_voices.py` which uploads
# whatever sits in data/reference-audio/ under the matching filename below.
voices:
