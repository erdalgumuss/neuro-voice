[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nqai-voice"
version = "0.1.0"
description = "NQAI Türkçe TTS platformu — Chatterbox Multilingual üstüne voice catalog + streaming API"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "NeuroQubit / NQAI" }]

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pyyaml>=6.0",
    "python-multipart>=0.0.12",
    "numpy>=2.0,<2.1",
    "soundfile>=0.12",
    "librosa>=0.11",
    "torch>=2.6",
    "torchaudio>=2.6",
    "transformers==4.46.3",
    "chatterbox-tts>=0.1.7",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
    "mypy>=1.13",
]
client = [
    "httpx>=0.27",
    "rich>=13.0",
]

[project.scripts]
nqai-voice-server = "server.main:run"
nqai-voice-smoke = "scripts.smoke_test:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["server*", "registry*", "frontend*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
