# NQAI Voice — local development stack.
#
# Default profile: Postgres 16 + Redis 7 + CPU gateway + local LiveKit.
# GPU inference runs only in the worker profile.
#
#   docker compose -f docker-compose.dev.yaml up --build
#
# GPU worker:
#
#   docker compose -f docker-compose.dev.yaml --profile gpu up --build
#
# First run, after the gateway image exists:
#   docker compose -f docker-compose.dev.yaml exec gateway \
#       alembic upgrade head
#   docker compose -f docker-compose.dev.yaml exec gateway \
#       python scripts/seed_operator.py --email you@nqai.com
#
# Then visit http://localhost:8000/admin/ — create a tenant + key,
# then issue API calls. See README.md for the API surface.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nqai
      POSTGRES_PASSWORD: nqai
      POSTGRES_DB: nqai_voice
    volumes:
      - nqai_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nqai -d nqai_voice"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - nqai_redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "127.0.0.1:7880:7880"      # WebSocket / HTTP API
      - "127.0.0.1:7881:7881"      # TCP fallback
      - "7882:7882/udp"            # WebRTC UDP media

  gateway:
    build:
      context: .
      dockerfile: deploy/gateway.Dockerfile
    image: nqai-voice-gateway:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NQAI_DATABASE_URL: "postgresql+asyncpg://nqai:nqai@postgres:5432/nqai_voice"
      NQAI_REDIS_URL: "redis://redis:6379/0"
      NQAI_DEVICE: cpu                     # GPU work runs in the worker (gpu profile)
      NQAI_REQUIRE_AUTH: "true"
      NQAI_JWT_SECRET: "${NQAI_JWT_SECRET:?must be set in .env, at least 32 chars}"
      NQAI_COOKIE_SECURE: "false"          # local HTTP — production keeps default true
      NQAI_VOICES_DIR: "/srv/nqai/configs/voices"
      NQAI_REFERENCE_DIR: "/srv/nqai/data/reference-audio"
      NQAI_QUEUE_DEPTH_LIMIT: "${NQAI_QUEUE_DEPTH_LIMIT:-200}"
      NQAI_LIVEKIT_URL: "ws://livekit:7880"
      NQAI_LIVEKIT_PUBLIC_URL: "ws://localhost:7880"
      NQAI_LIVEKIT_API_KEY: "${NQAI_LIVEKIT_API_KEY:-devkey}"
      NQAI_LIVEKIT_API_SECRET: "${NQAI_LIVEKIT_API_SECRET:-secret}"
      # R2 (optional in dev — gateway falls back to file:// references):
      NQAI_R2_ACCOUNT_ID: "${NQAI_R2_ACCOUNT_ID:-}"
      NQAI_R2_BUCKET: "${NQAI_R2_BUCKET:-}"
      NQAI_R2_ACCESS_KEY_ID: "${NQAI_R2_ACCESS_KEY_ID:-}"
      NQAI_R2_SECRET_ACCESS_KEY: "${NQAI_R2_SECRET_ACCESS_KEY:-}"
      PYTHONPATH: "/srv/nqai/src"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./configs:/srv/nqai/configs:rw
      - ./data:/srv/nqai/data:rw
      - ./migrations:/srv/nqai/migrations:ro
      - ./alembic.ini:/srv/nqai/alembic.ini:ro
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # --------------------------------------------------------------------- #
  # GPU worker.
  #
  # This service is intentionally behind the `gpu` profile so default
  # `docker compose up` doesn't try to launch it on a CPU-only dev box.
  # Canonical launcher:
  #   docker compose -f docker-compose.dev.yaml --profile gpu up worker
  #
  # GPU passthrough varies by host:
  #   * Linux + NVIDIA Container Toolkit: uncomment the `deploy.resources`
  #     stanza below.
  #   * Apple Silicon / Windows / no GPU: set NQAI_DEVICE=cpu and use the
  #     stub engine (NQAI_WORKER_MODE=stub in Faz B.2).
  # --------------------------------------------------------------------- #
  worker:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    image: nqai-voice-worker:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NQAI_DATABASE_URL: "postgresql+asyncpg://nqai:nqai@postgres:5432/nqai_voice"
      NQAI_REDIS_URL: "redis://redis:6379/0"
      NQAI_DEVICE: "${NQAI_WORKER_DEVICE:-cuda}"
      NQAI_WORKER_CONSUMER_NAME: "worker-${HOSTNAME:-local}"
      NQAI_WORKER_BLOCK_MS: "5000"
      NQAI_WORKER_XAUTOCLAIM_INTERVAL_S: "30"
      NQAI_WORKER_MAX_RETRIES: "3"
      NQAI_WORKER_DLQ_STREAM: "nqai.tts.jobs.dlq"
      NQAI_WARMUP_ON_BOOT: "true"
      NQAI_RESULT_STREAM_TTL_S: "600"
      NQAI_LORA_CACHE_SIZE: "${NQAI_LORA_CACHE_SIZE:-3}"
      NQAI_LIVEKIT_URL: "ws://livekit:7880"
      NQAI_LIVEKIT_PUBLIC_URL: "ws://localhost:7880"
      NQAI_LIVEKIT_API_KEY: "${NQAI_LIVEKIT_API_KEY:-devkey}"
      NQAI_LIVEKIT_API_SECRET: "${NQAI_LIVEKIT_API_SECRET:-secret}"
      NQAI_LIVE_WORKER_HEARTBEAT_INTERVAL_S: "1"
      NQAI_LIVE_WORKER_HEARTBEAT_TTL_S: "3"
      NQAI_LIVE_WORKER_MAX_SESSIONS: "${NQAI_LIVE_WORKER_MAX_SESSIONS:-1}"
      # Worker fails-loud at boot if R2 env missing — kept as soft
      # defaults here so `docker compose config` works without R2 set.
      NQAI_R2_ACCOUNT_ID: "${NQAI_R2_ACCOUNT_ID:-}"
      NQAI_R2_BUCKET: "${NQAI_R2_BUCKET:-}"
      NQAI_R2_ACCESS_KEY_ID: "${NQAI_R2_ACCESS_KEY_ID:-}"
      NQAI_R2_SECRET_ACCESS_KEY: "${NQAI_R2_SECRET_ACCESS_KEY:-}"
      PYTHONPATH: "/srv/nqai/src"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./configs:/srv/nqai/configs:ro
      - ./data:/srv/nqai/data:ro
      - nqai_model_cache:/root/.cache/huggingface
    command: ["python", "-m", "worker.main"]
    # Uncomment on a Linux host with the NVIDIA Container Toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: ["gpu"]

volumes:
  nqai_pgdata:
  nqai_redisdata:
  nqai_model_cache:
