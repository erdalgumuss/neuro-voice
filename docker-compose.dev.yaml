# NQAI Voice — local development stack.
#
# Default profile: Postgres 16 + Redis 7 + CPU gateway.
# GPU inference runs only in the worker profile.
#
#   docker compose -f docker-compose.dev.yaml up --build
#
# GPU worker:
#
#   docker compose -f docker-compose.dev.yaml --profile gpu up --build
#
# First run, after the gateway image exists:
#   docker compose -f docker-compose.dev.yaml exec gateway \
#       alembic upgrade head
#   docker compose -f docker-compose.dev.yaml exec gateway \
#       python scripts/seed_operator.py --email you@example.com
#
# Then visit http://localhost:8000/admin/ — create a tenant + key,
# then issue API calls. See README.md for the API surface.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurovoice
      POSTGRES_PASSWORD: neurovoice
      POSTGRES_DB: neurovoice
    volumes:
      - neurovoice_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurovoice -d neurovoice"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - neurovoice_redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: deploy/gateway.Dockerfile
    image: neurovoice-gateway:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEUROVOICE_DATABASE_URL: "postgresql+asyncpg://neurovoice:neurovoice@postgres:5432/neurovoice"
      NEUROVOICE_REDIS_URL: "redis://redis:6379/0"
      NEUROVOICE_DEVICE: cpu                     # GPU work runs in the worker (gpu profile)
      NEUROVOICE_REQUIRE_AUTH: "true"
      NEUROVOICE_JWT_SECRET: "${NEUROVOICE_JWT_SECRET:?must be set in .env, at least 32 chars}"
      NEUROVOICE_COOKIE_SECURE: "false"          # local HTTP — production keeps default true
      NEUROVOICE_VOICES_DIR: "/srv/neurovoice/configs/voices"
      NEUROVOICE_REFERENCE_DIR: "/srv/neurovoice/data/reference-audio"
      NEUROVOICE_QUEUE_DEPTH_LIMIT: "${NEUROVOICE_QUEUE_DEPTH_LIMIT:-200}"
      # R2 (optional in dev — gateway falls back to file:// references):
      NEUROVOICE_R2_ACCOUNT_ID: "${NEUROVOICE_R2_ACCOUNT_ID:-}"
      NEUROVOICE_R2_BUCKET: "${NEUROVOICE_R2_BUCKET:-}"
      NEUROVOICE_R2_ACCESS_KEY_ID: "${NEUROVOICE_R2_ACCESS_KEY_ID:-}"
      NEUROVOICE_R2_SECRET_ACCESS_KEY: "${NEUROVOICE_R2_SECRET_ACCESS_KEY:-}"
      PYTHONPATH: "/srv/neurovoice/src"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./configs:/srv/neurovoice/configs:rw
      - ./data:/srv/neurovoice/data:rw
      - ./migrations:/srv/neurovoice/migrations:ro
      - ./alembic.ini:/srv/neurovoice/alembic.ini:ro
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # --------------------------------------------------------------------- #
  # GPU worker.
  #
  # This service is intentionally behind the `gpu` profile so default
  # `docker compose up` doesn't try to launch it on a CPU-only dev box.
  # Canonical launcher:
  #   docker compose -f docker-compose.dev.yaml --profile gpu up worker
  #
  # GPU passthrough varies by host:
  #   * Linux + NVIDIA Container Toolkit: uncomment the `deploy.resources`
  #     stanza below.
  #   * Apple Silicon / Windows / no GPU: set NEUROVOICE_DEVICE=cpu and use the
  #     stub engine (NEUROVOICE_WORKER_MODE=stub).
  # --------------------------------------------------------------------- #
  worker:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    image: neurovoice-worker:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEUROVOICE_DATABASE_URL: "postgresql+asyncpg://neurovoice:neurovoice@postgres:5432/neurovoice"
      NEUROVOICE_REDIS_URL: "redis://redis:6379/0"
      NEUROVOICE_DEVICE: "${NEUROVOICE_WORKER_DEVICE:-cuda}"
      NEUROVOICE_WORKER_CONSUMER_NAME: "worker-${HOSTNAME:-local}"
      NEUROVOICE_WORKER_BLOCK_MS: "5000"
      NEUROVOICE_WORKER_XAUTOCLAIM_INTERVAL_S: "30"
      NEUROVOICE_WORKER_MAX_RETRIES: "3"
      NEUROVOICE_WORKER_DLQ_STREAM: "neurovoice.tts.jobs.dlq"
      NEUROVOICE_WARMUP_ON_BOOT: "true"
      NEUROVOICE_RESULT_STREAM_TTL_S: "600"
      NEUROVOICE_LORA_CACHE_SIZE: "${NEUROVOICE_LORA_CACHE_SIZE:-3}"
      # Worker fails-loud at boot if R2 env missing — kept as soft
      # defaults here so `docker compose config` works without R2 set.
      NEUROVOICE_R2_ACCOUNT_ID: "${NEUROVOICE_R2_ACCOUNT_ID:-}"
      NEUROVOICE_R2_BUCKET: "${NEUROVOICE_R2_BUCKET:-}"
      NEUROVOICE_R2_ACCESS_KEY_ID: "${NEUROVOICE_R2_ACCESS_KEY_ID:-}"
      NEUROVOICE_R2_SECRET_ACCESS_KEY: "${NEUROVOICE_R2_SECRET_ACCESS_KEY:-}"
      PYTHONPATH: "/srv/neurovoice/src"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./configs:/srv/neurovoice/configs:ro
      - ./data:/srv/neurovoice/data:ro
      - nqai_model_cache:/root/.cache/huggingface
    command: ["python", "-m", "worker.main"]
    # Uncomment on a Linux host with the NVIDIA Container Toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: ["gpu"]

volumes:
  neurovoice_pgdata:
  neurovoice_redisdata:
  nqai_model_cache:
