# NQAI Voice — Prometheus alert rules.
#
# Pairs with deploy/grafana/dashboards/nqai-voice.json. The thresholds
# here are starter values: tune them after the first real-traffic week
# and after `scripts/latency_bench.py` produces per-hardware baseline
# numbers (Faz C v1 item 2).
#
# Severity convention:
#   critical  — pager-worthy, customer-affecting
#   warning   — investigate this shift / next business day
#   info      — record in dashboards, no page

groups:
  - name: nqai-voice-availability
    interval: 30s
    rules:
      - alert: NqaiVoiceNoHealthyWorkers
        expr: max(nqai_worker_count) == 0
        for: 1m
        labels:
          severity: critical
          service: nqai-voice
        annotations:
          summary: "No NQAI Voice workers are healthy"
          description: |
            Worker heartbeats report 0 healthy workers for >1 minute.
            Gateway has fallen back to XLEN-only backpressure.
            Check worker pod health + Redis connectivity.

      - alert: NqaiVoiceHighErrorRate
        expr: |
          (
            sum(rate(nqai_tts_requests_total{status="error"}[5m]))
            /
            sum(rate(nqai_tts_requests_total[5m]))
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          service: nqai-voice
        annotations:
          summary: "TTS error rate >5% for 10 minutes"
          description: |
            More than 5% of TTS requests are terminating in error.
            Check nqai_tts_errors_total by type for the dominant failure
            mode (poison / transient / unknown / dlq).

      - alert: NqaiVoiceDlqGrowing
        expr: increase(nqai_worker_dlq_total[15m]) > 0
        for: 15m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "Jobs landing in DLQ"
          description: |
            One or more jobs have moved to the dead-letter queue in the
            last 15 minutes. Inspect `nqai.tts.jobs.dlq` Redis stream
            and reprocess after fixing the underlying failure.

  - name: nqai-voice-saturation
    interval: 30s
    rules:
      - alert: NqaiVoiceQueueBacklogHigh
        expr: max(nqai_queue_depth{stream="jobs"}) > 150
        for: 5m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "Job queue depth >150 for 5 minutes"
          description: |
            Sustained queue backlog. Either traffic exceeds cluster
            throughput or workers are degraded.
            Check worker count, capacity, in-flight ratio, and
            inference latency p95.

      - alert: NqaiVoiceBackpressureRate
        expr: sum(rate(nqai_tts_requests_total{status="backpressure"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "Backpressure 503s being issued at >0.1 req/s"
          description: |
            The gateway is denying requests via capacity-aware
            backpressure (or XLEN-only fallback). If sustained, scale
            workers OR raise NQAI_QUEUE_DEPTH_LIMIT (only if the cluster
            can actually drain it).

  - name: nqai-voice-latency
    interval: 30s
    rules:
      # Tune these on first real-traffic week. Starter values target
      # L4-class GPU with VoxCPM2; T4 will breach until tuned.
      - alert: NqaiVoiceFirstAudioP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(nqai_tts_first_audio_seconds_bucket[5m]))
          ) > 2.0
        for: 10m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "First-audio p95 >2s for 10 minutes"
          description: |
            Worker-side first-audio latency p95 is above 2 seconds.
            Compare nqai_tts_inference_seconds (model) vs
            nqai_tts_reference_resolve_seconds (R2 cache) vs
            nqai_tts_worker_pickup_seconds (queue health) to isolate.

      - alert: NqaiVoiceGatewayTransportOverhead
        expr: |
          (
            histogram_quantile(0.95, sum by (le) (rate(nqai_tts_gateway_first_byte_seconds_bucket[5m])))
            -
            histogram_quantile(0.95, sum by (le) (rate(nqai_tts_first_audio_seconds_bucket[5m])))
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "Gateway/transport adding >200ms on top of worker first-audio (p95)"
          description: |
            gateway_first_byte_ms − first_audio_ms gap should be small
            (< 100 ms typical). Sustained > 200 ms means HTTP framing /
            ASGI buffering / network overhead is dominating, not the
            worker. Check uvicorn worker count, body-size limits, and
            client-side network path.

  # ---------------------------------------------------------------------
  # MLOps PR #2 — output PCM quality (catches "audio out but garbage")
  # ---------------------------------------------------------------------
  # These alerts close the gap that the latency / error rules can't
  # see: the model produces SOMETHING (no exception, no DLQ) but that
  # something is silent, clipping, or wrong-length. Failure mode is
  # invisible without these; first signal is a customer ticket.
  - name: nqai-voice-quality
    interval: 30s
    rules:
      - alert: NqaiVoiceSilentOutput
        expr: |
          histogram_quantile(0.5, sum by (le) (rate(nqai_tts_output_rms_normalized_bucket[5m]))) < 0.005
        for: 5m
        labels:
          severity: critical
          service: nqai-voice
        annotations:
          summary: "Median TTS output RMS < 0.005 (effectively silent) for 5m"
          description: |
            The engine is producing audio buffers whose median RMS is
            below 0.5% of int16 full-scale — effectively silence. No
            HTTP error fires for this; the request looks healthy in
            every other metric. Likely causes: stuck inference loop
            returning zeros, post-process gain bug, or reference audio
            failure cascading into engine silence.

      - alert: NqaiVoiceHighSilenceRatio
        expr: |
          histogram_quantile(0.95, sum by (le) (rate(nqai_tts_output_silence_ratio_bucket[5m]))) > 0.5
        for: 10m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "p95 of output silence_ratio > 0.5 for 10m"
          description: |
            Half or more of the output PCM samples are below the
            silence threshold for the top 5% of requests. Indicates
            attention dropouts or partial truncation; check the
            engine_inputs audit trail for a model_id / preset
            correlation.

      - alert: NqaiVoiceClippingDetected
        expr: |
          histogram_quantile(0.95, sum by (le) (rate(nqai_tts_output_clipping_ratio_bucket[5m]))) > 0.001
        for: 10m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "p95 of clipping_ratio > 0.1% for 10m"
          description: |
            Output is saturating at int16 full-scale for the top 5%
            of requests. Audible distortion. Likely a post-process
            gain bug or aggressive voice_settings.speed extreme.

      - alert: NqaiVoiceAbnormalDurationPerChar
        expr: |
          (
            histogram_quantile(0.95, sum by (le) (rate(nqai_tts_output_seconds_per_char_bucket[5m]))) > 0.25
          )
          or
          (
            histogram_quantile(0.5, sum by (le) (rate(nqai_tts_output_seconds_per_char_bucket[5m]))) < 0.03
          )
        for: 15m
        labels:
          severity: warning
          service: nqai-voice
        annotations:
          summary: "Output seconds-per-char out of [0.03, 0.25] envelope for 15m"
          description: |
            Turkish steady-state read rate is ~0.07-0.08 s/char in our
            domain. Sustained values above 0.25 suggest a stuck loop
            generating audio for far longer than the text warrants;
            below 0.03 suggests truncation. Cross-reference with
            sentence_count to localise.
