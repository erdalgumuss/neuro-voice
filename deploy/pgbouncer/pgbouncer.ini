; pgBouncer config for NQAI Voice (Faz C v1 item 4).
;
; Transaction-mode pooling is mandatory for async Python apps like
; ours: the gateway and worker open dozens of small transactions, and
; Postgres connection overhead would dominate the latency budget at
; scale. With transaction mode, pgBouncer hands the same server-side
; connection to many clients sequentially — the math becomes:
;
;     postgres_conns = pgbouncer_default_pool_size * databases
;     client_conns   = pgbouncer_max_client_conn  (gateway + worker pool ×N)
;
; We keep `client_conns` ~10× `postgres_conns` because the actual
; on-the-wire work per request is microseconds long and the connection
; is held just long enough for the transaction to commit.
;
; Caveats:
;   * The application MUST disable asyncpg statement caching when
;     hitting pgBouncer. Set NEUROVOICE_DB_PGBOUNCER=true on gateway + worker
;     and src/db/session.py will pass statement_cache_size=0 through.
;   * Don't use server-side cursors, advisory locks, or LISTEN/NOTIFY
;     in code paths that hit pgBouncer — those need session-mode
;     pooling. We don't currently use any of these.
;   * `auth_query` is configured for SCRAM-SHA-256; the Postgres role
;     `nqai_pgbouncer` needs SELECT on `pg_authid` (see runbook).

[databases]
neurovoice = host=postgres port=5432 dbname=neurovoice

[pgbouncer]
; Listen for the gateway + worker.
listen_addr = 0.0.0.0
listen_port = 6432

; Auth — operators replace userlist.txt with a real SCRAM-hashed file.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
; Recommended for production: auth_query against pg_authid using a
; minimal-privilege role.
; auth_user = nqai_pgbouncer
; auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename = $1

; ---- Pool sizing ----
;
; Per-database / per-user default. Picked so a 200-concurrent-client
; gateway+worker fleet fans into ≤40 actual Postgres connections
; (well within max_connections=100 default + headroom for admin tools).
pool_mode = transaction
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 5

; ---- Client limits ----
;
; Each gateway and worker process opens up to ~10 client conns
; (NEUROVOICE_DB_POOL_SIZE=5 + NEUROVOICE_DB_MAX_OVERFLOW=5 in pgBouncer mode).
; 200 client conn capacity = 20 processes × 10. Tune up when scaling
; horizontally.
max_client_conn = 200

; ---- Timeouts ----
;
; server_idle_timeout: drop server connections idle this long.
; Match pool_recycle on the application side.
server_idle_timeout = 600
; query_wait_timeout: how long a client waits for a server slot before
; we 503-equivalent. Keep below the gateway's NEUROVOICE_SYNC_TIMEOUT_S=30
; so the application sees a Postgres error, not a hung handler.
query_wait_timeout = 20

; ---- Logging ----
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; ---- TLS (uncomment for prod) ----
; server_tls_sslmode = verify-full
; server_tls_ca_file = /etc/pgbouncer/ca.crt
; client_tls_sslmode = require
; client_tls_cert_file = /etc/pgbouncer/server.crt
; client_tls_key_file  = /etc/pgbouncer/server.key
